name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_tag:
        description: "Release tag to publish agent assets to"
        required: false
        default: "agent-latest"
      ref:
        description: "Git ref to build (branch, tag, or SHA)"
        required: false
        default: "main"
permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: shuguangnet/vaultfleet

jobs:
  test:
    name: Test
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./... -v -race

  docker:
    name: Publish Docker image
    if: github.event_name != 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-agent:
    name: Build Agent (${{ matrix.goarch }})
    needs: []
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Agent binary
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w -X main.version=${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || github.sha }}" -o dist/vaultfleet-agent-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/agent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/vaultfleet-agent-*

  publish-agent:
    name: Publish Agent release assets
    needs: release-agent
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Resolve release tag
        id: release_tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.publish_tag || 'agent-latest' }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Download all agent artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: agent-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum vaultfleet-agent-* > checksums.txt

      - name: Ensure release exists and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ steps.release_tag.outputs.tag }}" >/dev/null 2>&1 || \
            gh release create "${{ steps.release_tag.outputs.tag }}" --target "${{ github.sha }}" --title "${{ steps.release_tag.outputs.tag }}" --notes "Automated agent asset release"
          gh release upload "${{ steps.release_tag.outputs.tag }}" \
            dist/vaultfleet-agent-linux-amd64 \
            dist/vaultfleet-agent-linux-arm64 \
            dist/checksums.txt \
            --clobber
